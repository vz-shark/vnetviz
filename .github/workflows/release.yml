name: release

# Push a tag like v0.1.0 to build the linux/amd64 and linux/arm64 binaries and
# publish them as a GitHub Release. Asset names embed the version
# (vnetviz_<version>_linux_<arch>.tar.gz); install.sh resolves the latest tag
# from the /releases/latest redirect before downloading.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build binaries
        env:
          VERSION: ${{ github.ref_name }}
          CGO_ENABLED: "0"
        run: |
          ver="${VERSION#v}"
          mkdir -p dist
          for arch in amd64 arm64; do
            echo "building linux/$arch"
            GOOS=linux GOARCH="$arch" go build \
              -ldflags "-s -w -X main.version=${VERSION}" \
              -o "dist/vnetviz" ./cmd/vnetviz
            tar -C dist -czf "dist/vnetviz_${ver}_linux_${arch}.tar.gz" vnetviz
            rm -f dist/vnetviz
          done
          ( cd dist && sha256sum vnetviz_*_linux_*.tar.gz > checksums.txt )
          cat dist/checksums.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/vnetviz_*_linux_amd64.tar.gz \
            dist/vnetviz_*_linux_arm64.tar.gz \
            dist/checksums.txt
